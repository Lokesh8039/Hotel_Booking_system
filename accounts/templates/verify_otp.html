{% extends "utils/base.html" %}

{% block start %}
<div class="container my-5 pt-5 pb-5">
  <div class="row justify-content-center">
    <div class="col-11 col-sm-9 col-md-7 col-lg-5 col-xl-4">
      <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
        <!-- Colored Header -->
        <div class="p-4 text-center text-white" style="background: linear-gradient(135deg, #ff416c, #ff4b2b);">
          <h3 class="fw-bold m-0">OTP Verification</h3>
          <p class="small m-0 opacity-75">Secure account verification</p>
        </div>

        <!-- Form Card Body -->
        <div class="card-body p-4 p-sm-5 bg-white text-center">
          <form method="POST">
            {% include "utils/alerts.html" %}
            {% csrf_token %}

            <div class="mb-4">
              <i class="bi bi-shield-lock text-danger display-4"></i>
            </div>

            <!-- OTP Input -->
            <div class="mb-4 text-start">
              <label for="otp" class="form-label fw-semibold text-muted small d-block text-center">Enter Verification Code</label>
              <div class="input-group">
                <span class="input-group-text bg-light text-muted border-end-0"><i class="bi bi-key"></i></span>
                <input type="text" name="otp" class="form-control border-start-0 ps-0 bg-light text-center fs-4 fw-bold letter-spacing-md" placeholder="••••" maxlength="6" required id="otp">
              </div>
              <div class="form-text small text-center mt-2">Enter the 4-digit code sent to your registered email address.</div>
            </div>

            <div class="d-grid mb-3">
              <button type="submit" class="btn btn-warning fw-bold text-dark py-2.5 rounded-3 shadow-sm">
                Verify Code
              </button>
            </div>
          </form>

          <div class="text-center mt-4">
            <a href="{% url 'login_page' %}" class="text-secondary small text-decoration-none"><i class="bi bi-arrow-left me-1"></i> Back to Login</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<style>
  .letter-spacing-md {
    letter-spacing: 0.5rem;
  }
</style>
{% endblock %}
