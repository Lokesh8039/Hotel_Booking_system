{% extends "utils/base.html" %}

{% block start %}
<div class="container my-5 pt-5 pb-5">
  <div class="row justify-content-center">
    <div class="col-11 col-sm-9 col-md-7 col-lg-5 col-xl-4">
      <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
        <!-- Colored Header -->
        <div class="p-4 text-center text-white" style="background: linear-gradient(135deg, #ff416c, #ff4b2b);">
          <h3 class="fw-bold m-0">Welcome Back</h3>
          <p class="small m-0 opacity-75">Sign in to your guest account</p>
        </div>

        <!-- Form Card Body -->
        <div class="card-body p-4 p-sm-5 bg-white">
          <form method="POST" id="loginForm">
            {% include "utils/alerts.html" %}
            {% csrf_token %}

            <!-- Email Address Input -->
            <div class="mb-3">
              <label for="loginEmail" class="form-label fw-semibold text-muted small">Email Address</label>
              <div class="input-group">
                <span class="input-group-text bg-light text-muted border-end-0"><i class="bi bi-envelope"></i></span>
                <input id="loginEmail" type="email" name="email" class="form-control border-start-0 ps-0 bg-light" placeholder="name@example.com" required>
              </div>
            </div>

            <!-- Password Input -->
            <div class="mb-4" id="passwordFieldGroup">
              <label for="loginPassword" class="form-label fw-semibold text-muted small">Password</label>
              <div class="input-group">
                <span class="input-group-text bg-light text-muted border-end-0"><i class="bi bi-lock"></i></span>
                <input id="loginPassword" type="password" name="password" class="form-control border-start-0 ps-0 bg-light" placeholder="••••••••" required>
              </div>
            </div>

            <div class="d-grid gap-2 mb-4">
              <button type="submit" class="btn btn-warning fw-bold text-dark py-2.5 rounded-3 shadow-sm">
                <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
              </button>
              <button type="button" class="btn btn-outline-success fw-bold py-2.5 rounded-3" onclick="sendOtp()">
                <i class="bi bi-shield-lock me-1"></i> Sign In With OTP
              </button>
            </div>
          </form>

          <hr class="my-4 opacity-10">

          <div class="text-center">
            <p class="small text-muted mb-0">Don't have a guest account? 
              <a href="{% url 'register' %}" class="text-danger fw-bold text-decoration-none">Register here</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  function sendOtp() {
    var email = document.getElementById('loginEmail').value.trim();
    if (email === "") {
      alert("Please enter your email address to request an OTP.");
      return;
    }
    window.location.href = `/account/send_otp/${encodeURIComponent(email)}/`;
  }
</script>
{% endblock %}
