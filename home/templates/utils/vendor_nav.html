{% load static %}
<nav class="navbar navbar-expand-lg navbar-dark shadow-sm p-3 sticky-top" style="background: linear-gradient(135deg, #1f1c2c, #928dab); border-radius: 0 0 24px 24px; z-index: 1000;">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center fw-bold text-white" href="/" style="font-size: 1.4rem; letter-spacing: -0.5px;">
      <img height="38" src="{% static 'logo.png' %}" class="me-2" alt="Logo">
      Hotel Vendor Portal
    </a>

    <button class="navbar-toggler text-white border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
      aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse justify-content-end" id="navbarSupportedContent">
      <ul class="navbar-nav align-items-center gap-2">
        {% if request.user.is_authenticated %}
          <li class="nav-item">
            <a class="nav-link nav-glass text-white px-4 py-2 rounded-pill" href="{% url 'dashboard' %}"><i class="bi bi-speedometer2 me-1"></i> Dashboard</a>
          </li>
          <li class="nav-item">
            <a class="nav-link nav-glass text-white px-4 py-2 rounded-pill" href="{% url 'logout_vendor' %}"><i class="bi bi-box-arrow-right me-1"></i> Logout</a>
          </li>
          <li class="nav-item ms-lg-2">
            <span class="nav-link text-white fw-bold px-3 py-2 rounded-pill bg-white bg-opacity-10 d-inline-flex align-items-center gap-2">
              <i class="bi bi-person-badge"></i> {{ user }}
            </span>
          </li>
        {% else %}
          <li class="nav-item">
            <a class="nav-link nav-glass text-white px-4 py-2 rounded-pill" href="{% url 'register_vendor' %}"><i class="bi bi-person-plus me-1"></i> Partner Register</a>
          </li>
          <li class="nav-item">
            <a class="nav-link nav-glass text-white px-4 py-2 rounded-pill" href="{% url 'login_vendor' %}"><i class="bi bi-box-arrow-in-right me-1"></i> Partner Login</a>
          </li>
        {% endif %}
      </ul>
    </div>
  </div>
</nav>
