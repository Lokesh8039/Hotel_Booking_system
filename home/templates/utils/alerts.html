<div class="position-fixed top-0 end-0 p-4" style="z-index: 9999; max-width: 380px;">
  {% if messages %}
    {% for message in messages %}
      <div class="toast-card toast-{{ message.tags|default:'info' }} show mb-3" role="alert">
        <div class="toast-card-body">
          <div class="d-flex align-items-start gap-3">
            <div class="toast-icon">
              {% if message.tags == 'success' %}
                <i class="bi bi-check-circle-fill text-success fs-4"></i>
              {% elif message.tags == 'error' or message.tags == 'danger' %}
                <i class="bi bi-exclamation-circle-fill text-danger fs-4"></i>
              {% elif message.tags == 'warning' %}
                <i class="bi bi-exclamation-triangle-fill text-warning fs-4"></i>
              {% else %}
                <i class="bi bi-info-circle-fill text-info fs-4"></i>
              {% endif %}
            </div>
            <div class="flex-grow-1">
              <h6 class="fw-bold text-dark m-0 mb-1 text-capitalize">{{ message.tags|default:'Notification' }}</h6>
              <p class="text-muted small m-0">{{ message }}</p>
            </div>
            <button type="button" class="btn-close-custom" onclick="this.closest('.toast-card').remove();" aria-label="Close">
              <i class="bi bi-x"></i>
            </button>
          </div>
        </div>
        <div class="toast-progress"></div>
      </div>
    {% endfor %}
  {% endif %}
</div>

<style>
  .toast-card {
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.4);
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
    border-radius: 16px;
    overflow: hidden;
    position: relative;
    width: 340px;
    animation: slideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards, fadeOut 0.5s ease 4.5s forwards;
  }
  
  .toast-card-body {
    padding: 16px 20px;
  }

  /* Left accent border */
  .toast-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    bottom: 0;
    width: 6px;
  }
  
  .toast-success::before { background: #10b981; }
  .toast-error::before, .toast-danger::before { background: #ef4444; }
  .toast-warning::before { background: #f59e0b; }
  .toast-info::before { background: #3b82f6; }

  /* Close button */
  .btn-close-custom {
    background: none;
    border: none;
    color: #9ca3af;
    cursor: pointer;
    font-size: 1.25rem;
    padding: 0;
    line-height: 1;
    transition: color 0.2s;
  }
  .btn-close-custom:hover {
    color: #4b5563;
  }

  /* Shrinking progress bar animation */
  .toast-progress {
    position: absolute;
    bottom: 0;
    left: 0;
    height: 4px;
    width: 100%;
  }
  
  .toast-success .toast-progress { background: rgba(16, 185, 129, 0.4); }
  .toast-error .toast-progress, .toast-danger .toast-progress { background: rgba(239, 68, 68, 0.4); }
  .toast-warning .toast-progress { background: rgba(245, 158, 11, 0.4); }
  .toast-info .toast-progress { background: rgba(59, 130, 246, 0.4); }

  .toast-progress {
    animation: shrinkProgress 4.5s linear forwards;
  }

  @keyframes slideIn {
    from {
      transform: translateX(120%);
      opacity: 0;
    }
    to {
      transform: translateX(0);
      opacity: 1;
    }
  }

  @keyframes fadeOut {
    from {
      opacity: 1;
      transform: scale(1);
    }
    to {
      opacity: 0;
      transform: scale(0.9);
      display: none;
    }
  }

  @keyframes shrinkProgress {
    from { width: 100%; }
    to { width: 0%; }
  }
</style>
